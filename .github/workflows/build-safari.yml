name: Build Safari Extension

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Convert to Safari Web Extension
      run: |
        echo "Convertendo a extensão web para um projeto Safari..."
        xcrun safari-web-extension-converter ./ --project-location ./SafariProject --app-name "CrunchyrollSpeed" --no-prompt --no-open
        
    - name: Build Xcode Project
      run: |
        echo "Compilando o aplicativo do Safari..."
        cd SafariProject/CrunchyrollSpeed
        # O build é feito especificamente para o macOS (as versões mais novas do conversor geram targets para iOS também)
        xcodebuild build -project "CrunchyrollSpeed.xcodeproj" -scheme "CrunchyrollSpeed (macOS)" -configuration Release SYMROOT="$(pwd)/build"
        
    - name: Archive macOS App
      run: |
        echo "Zipando o aplicativo pronto..."
        cd SafariProject/CrunchyrollSpeed/build/Release
        zip -r CrunchyrollSpeed-SafariApp.zip "CrunchyrollSpeed.app"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CrunchyrollSpeed-SafariApp
        path: SafariProject/CrunchyrollSpeed/build/Release/CrunchyrollSpeed-SafariApp.zip
