name: Build and Release Extension

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write # Necessário para criar releases
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Version
        id: version
        run: |
          BASE_VERSION=$(jq -r .version manifest.json)
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Prepare Extension Files
        run: |
          mkdir -p dist/firefox dist/chrome dist/safari
          
          # Arquivos comuns
          FILES="popup.html popup.js content.js"
          
          # Para o Firefox, copiamos o manifest original (que tem o browser_specific_settings)
          cp manifest.json $FILES dist/firefox/
          
          # Para Chrome e Safari, removemos a chave browser_specific_settings do manifest para evitar warnings nas lojas deles
          jq 'del(.browser_specific_settings)' manifest.json > manifest-clean.json
          cp manifest-clean.json dist/chrome/manifest.json
          cp $FILES dist/chrome/
          cp manifest-clean.json dist/safari/manifest.json
          cp $FILES dist/safari/

      - name: Build and Zip packages
        run: |
          # ZIP padrão para Firefox e Chrome
          cd dist/firefox && zip -r ../../crunchyroll-firefox-v${{ env.VERSION }}.zip . && cd ../..
          cd dist/chrome && zip -r ../../crunchyroll-chrome-v${{ env.VERSION }}.zip . && cd ../..
          
          # Construindo a Web Extension do Safari para gerar o .app
          # 1. Cria a base do projeto Xcode
          xcrun safari-web-extension-converter dist/safari --project-location dist/safari-wrapper --app-name "CrunchyrollController" --no-prompt --no-open
          
          # 2. Faz o build do arquivo .app no Xcode ignorando a assinatura do desenvolvedor (CODE_SIGNING_ALLOWED=NO)
          xcodebuild -project "dist/safari-wrapper/CrunchyrollController/CrunchyrollController.xcodeproj" -scheme "CrunchyrollController (macOS)" -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build SYMROOT="$(pwd)/dist/safari-build"
          
          # 3. Zipa o arquivo .app gerado
          cd dist/safari-build/Release && zip -r ../../../crunchyroll-safari-v${{ env.VERSION }}.zip CrunchyrollController.app && cd ../../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: "Auto-generated release for version ${{ env.VERSION }}."
          files: |
            crunchyroll-chrome-v${{ env.VERSION }}.zip
            crunchyroll-firefox-v${{ env.VERSION }}.zip
            crunchyroll-safari-v${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
