<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 12px;
      width: 180px;
      background-color: #141519;
      margin: 0;
      color: #ffffff;
    }
    h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 12px;
      color: #f47521;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      width: 100%;
      padding: 8px 4px;
      cursor: pointer;
      background-color: #23252b;
      color: #ffffff;
      border: 1px solid #33363e;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s ease;
    }
    button:hover {
      background-color: #f47521;
      border-color: #f47521;
      color: #141519;
    }
    button.selected {
      background-color: #f47521;
      border-color: #f47521;
      color: #141519;
    }
    .full-width {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <h3>Playback Speed</h3>
  <div class="grid">
    <button class="speed-btn" data-speed="0.75">0.75x</button>
    <button class="speed-btn" data-speed="1.25">1.25x</button>
    <button class="speed-btn full-width" data-speed="1.0">1.0x (Normal)</button>
    <button class="speed-btn" data-speed="1.5">1.5x</button>
    <button class="speed-btn" data-speed="1.8">1.8x</button>
    <button class="speed-btn full-width" data-speed="2.0">2.0x</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
