<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 16px;
      width: 200px;
      background-color: #141519;
      margin: 0;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 12px;
      color: #f47521;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .slider-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .speed-display {
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(244, 117, 33, 0.3);
    }
    .speed-display span {
      font-size: 16px;
      color: #f47521;
      margin-left: 2px;
    }
    
    /* Range Slider Styling */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      margin: 8px 0;
    }
    
    input[type=range]:focus {
      outline: none;
    }
    
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: #33363e;
      border-radius: 3px;
      border: none;
    }
    
    input[type=range]::-webkit-slider-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #f47521;
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -5px;
      box-shadow: 0 0 8px rgba(244, 117, 33, 0.6);
      transition: all 0.2s ease;
    }
    
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(244, 117, 33, 0.8);
    }
    
    .presets {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 8px;
    }
    
    .preset-btn {
      background: none;
      border: 1px solid #33363e;
      color: #aaaaaa;
      cursor: pointer;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    
    .preset-btn:hover {
      color: #141519;
      background-color: #f47521;
      border-color: #f47521;
    }
  </style>
</head>
<body>
  <h3>Playback Speed</h3>
  
  <div class="slider-container">
    <div class="speed-display" id="speed-value">1.0<span>x</span></div>
    
    <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
    
    <div class="presets">
      <button class="preset-btn" data-speed="1.0">1.0</button>
      <button class="preset-btn" data-speed="1.5">1.5</button>
      <button class="preset-btn" data-speed="2.0">2.0</button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
