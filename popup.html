<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      width: 150px;
      background-color: #f2f2f2;
    }
    h3 {
      text-align: center;
      margin-top: 0;
      color: #f47521; /* Crunchyroll orange */
    }
    button {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px;
      cursor: pointer;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-weight: bold;
    }
    button:hover {
      background-color: #e0e0e0;
    }
  </style>
</head>
<body>
  <h3>Velocidade</h3>
  <button data-speed="0.75">0.75x</button>
  <button data-speed="1.0">1.0x (Normal)</button>
  <button data-speed="1.25">1.25x</button>
  <button data-speed="1.5">1.5x</button>
  <button data-speed="2.0">2.0x</button>
  
  <script src="popup.js"></script>
</body>
</html>
